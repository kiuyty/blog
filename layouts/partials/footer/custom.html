{{- /* 添加Live2D看板娘 - 绝对路径直载版 */ -}}
<script>
  (function() {
    const cdnPath = "https://cdn.jsdelivr.net/gh/kiuyty/live2d@main";
    
    // 直接定义模型的完整绝对路径
    const modelFullPath = cdnPath + "/Resources/model/lafei/lafei.model3.json";
    
    const config = {
      path: {
        homePath: "/",
        // 注意：我们不再使用 modelPath 给 init，因为 init 可能无效
        cssPath: cdnPath + "/css/waifu.css",
        tipsJsonPath: cdnPath + "/Resources/waifu-tips.json",
        tipsJsPath: cdnPath + "/js/waifu-tips.js",
        live2dCorePath: cdnPath + "/Core/live2dcubismcore.js",
        live2dSdkPath: cdnPath + "/js/live2d-sdk.js"
      },
      tools: ["hitokoto", "asteroids", "express", "photo", "info", "quit"],
      drag: { enable: true, direction: ["x", "y"] },
      switchType: "order"
    };

    console.log('Live2D 绝对路径直载版启动', cdnPath);
    console.log('模型完整路径:', modelFullPath);

    if (screen.width < 768) {
      console.log('移动端不显示');
      return;
    }

    // 手动创建看板娘 DOM 结构
    function createWaifuDOM() {
      if (document.getElementById('waifu')) {
        console.log('看板娘 DOM 已存在');
        return;
      }
      
      console.log('手动创建看板娘 DOM 结构...');
      
      const waifuDiv = document.createElement('div');
      waifuDiv.id = 'waifu';
      
      const tipsDiv = document.createElement('div');
      tipsDiv.id = 'waifu-tips';
      waifuDiv.appendChild(tipsDiv);
      
      const canvas = document.createElement('canvas');
      canvas.id = 'live2d';
      canvas.width = 800;
      canvas.height = 800;
      waifuDiv.appendChild(canvas);
      
      const toolDiv = document.createElement('div');
      toolDiv.id = 'waifu-tool';
      waifuDiv.appendChild(toolDiv);
      
      document.body.appendChild(waifuDiv);
      console.log('✅ 看板娘 DOM 创建完成');
    }

    // 加载资源
    Promise.all([
      loadCSS(config.path.cssPath),
      loadScript(config.path.live2dCorePath),
      loadScript(config.path.live2dSdkPath),
      loadScript(config.path.tipsJsPath)
    ]).then(() => {
      console.log('所有核心脚本加载完成');
      
      createWaifuDOM();
      
      setTimeout(() => {
        const canvas = document.getElementById('live2d');
        if (canvas && window.live2d) {
          console.log('✅ canvas 已就绪');
          
          // 关键修改：跳过 init，直接使用绝对路径加载
          console.log('直接使用绝对路径加载模型:', modelFullPath);
          window.live2d.loadModel(modelFullPath);
          
        } else {
          console.error('❌ canvas 或 live2d 对象未就绪');
        }
      }, 500);
      
    }).catch(e => console.error('初始化失败:', e));

    function loadCSS(url) {
      return new Promise((resolve, reject) => {
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = url;
        link.onload = () => {
          console.log('CSS加载成功:', url);
          resolve(url);
        };
        link.onerror = (e) => {
          console.error('CSS加载失败:', url, e);
          reject(url);
        };
        document.head.appendChild(link);
      });
    }

    function loadScript(url) {
      return new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = url;
        script.onload = () => {
          console.log('JS加载成功:', url);
          resolve(url);
        };
        script.onerror = (e) => {
          console.error('JS加载失败:', url, e);
          reject(url);
        };
        document.head.appendChild(script);
      });
    }
  })();
</script>

<style>
  #waifu {
    right: 0;
    bottom: 0;
    left: auto;
    z-index: 9999;
  }
  #waifu-toggle {
    right: 5px;
    left: auto;
    z-index: 9999;
  }
  #waifu canvas {
    pointer-events: auto;
  }
</style>
