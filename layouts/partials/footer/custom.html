{{- /* 添加Live2D看板娘 - 手动创建版 */ -}}
<script>
  (function() {
    const cdnPath = "https://cdn.jsdelivr.net/gh/kiuyty/live2d@main";
    
    // 定义模型基础目录和文件名
    const modelBaseDir = cdnPath + "/Resources/model/lafei/";
    const modelFileName = "lafei.model3.json";
    
    const config = {
      path: {
        homePath: "/",
        modelPath: modelBaseDir,
        cssPath: cdnPath + "/css/waifu.css",
        tipsJsonPath: cdnPath + "/Resources/waifu-tips.json",
        tipsJsPath: cdnPath + "/js/waifu-tips.js",
        live2dCorePath: cdnPath + "/Core/live2dcubismcore.js",
        live2dSdkPath: cdnPath + "/js/live2d-sdk.js"
      },
      tools: ["hitokoto", "asteroids", "express", "photo", "info", "quit"],
      drag: { enable: true, direction: ["x", "y"] },
      switchType: "order"
    };

    console.log('Live2D 手动创建版启动', cdnPath);

    if (screen.width < 768) {
      console.log('移动端不显示');
      return;
    }

    // ========== 手动创建看板娘 DOM 结构 ==========
    function createWaifuDOM() {
      // 检查是否已存在
      if (document.getElementById('waifu')) {
        console.log('看板娘 DOM 已存在');
        return;
      }
      
      console.log('手动创建看板娘 DOM 结构...');
      
      // 创建主容器
      const waifuDiv = document.createElement('div');
      waifuDiv.id = 'waifu';
      
      // 创建提示框
      const tipsDiv = document.createElement('div');
      tipsDiv.id = 'waifu-tips';
      waifuDiv.appendChild(tipsDiv);
      
      // 创建 canvas
      const canvas = document.createElement('canvas');
      canvas.id = 'live2d';
      canvas.width = 800;
      canvas.height = 800;
      waifuDiv.appendChild(canvas);
      
      // 创建工具栏
      const toolDiv = document.createElement('div');
      toolDiv.id = 'waifu-tool';
      waifuDiv.appendChild(toolDiv);
      
      // 添加到页面
      document.body.appendChild(waifuDiv);
      
      console.log('✅ 看板娘 DOM 创建完成');
    }

    // 先加载资源，再创建DOM，最后初始化SDK
    Promise.all([
      loadCSS(config.path.cssPath),
      loadScript(config.path.live2dCorePath),
      loadScript(config.path.live2dSdkPath),
      loadScript(config.path.tipsJsPath)
    ]).then(() => {
      console.log('所有核心脚本加载完成');
      
      // 创建 DOM 结构
      createWaifuDOM();
      
      // 给 DOM 一点时间渲染
      setTimeout(() => {
        const canvas = document.getElementById('live2d');
        if (canvas) {
          console.log('✅ canvas 已就绪');
          
          if (window.live2d) {
            console.log('调用 init，基础目录:', modelBaseDir);
            window.live2d.init(modelBaseDir);
            
            setTimeout(() => {
              console.log('调用 loadModel，文件名:', modelFileName);
              window.live2d.loadModel(modelFileName);
            }, 500);
          }
        } else {
          console.error('❌ canvas 创建失败');
        }
      }, 500);
      
    }).catch(e => console.error('初始化失败:', e));

    function loadCSS(url) {
      return new Promise((resolve, reject) => {
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = url;
        link.onload = () => {
          console.log('CSS加载成功:', url);
          resolve(url);
        };
        link.onerror = (e) => {
          console.error('CSS加载失败:', url, e);
          reject(url);
        };
        document.head.appendChild(link);
      });
    }

    function loadScript(url) {
      return new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = url;
        script.onload = () => {
          console.log('JS加载成功:', url);
          resolve(url);
        };
        script.onerror = (e) => {
          console.error('JS加载失败:', url, e);
          reject(url);
        };
        document.head.appendChild(script);
      });
    }
  })();
</script>

<style>
  #waifu {
    right: 0;
    bottom: 0;
    left: auto;
    z-index: 9999;
  }
  #waifu-toggle {
    right: 5px;
    left: auto;
    z-index: 9999;
  }
  #waifu canvas {
    pointer-events: auto;
  }
</style>
