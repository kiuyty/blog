{{- /* 添加Live2D看板娘 - 双模型适配版 */ -}}
<script>
  (function() {
    const cdnPath = "https://cdn.jsdelivr.net/gh/kiuyty/live2d@main";
    
    const config = {
      path: {
        homePath: "/",
        modelPath: cdnPath + "/Resources/",
        cssPath: cdnPath + "/css/waifu.css",
        tipsJsonPath: cdnPath + "/Resources/waifu-tips.json",
        tipsJsPath: cdnPath + "/js/waifu-tips.js",
        live2dCorePath: cdnPath + "/Core/live2dcubismcore.js",
        live2dSdkPath: cdnPath + "/js/live2d-sdk.js"
      },
      tools: ["hitokoto", "asteroids", "express", "switch-model", "switch-texture", "photo", "info", "quit"],
      drag: { enable: true, direction: ["x", "y"] },
      switchType: "order"
    };

    console.log('Live2D 双模型适配版启动', cdnPath);

    if (screen.width < 768) {
      console.log('移动端不显示');
      return;
    }

    Promise.all([
      loadCSS(config.path.cssPath),
      loadScript(config.path.live2dCorePath),
      loadScript(config.path.live2dSdkPath),
      loadScript(config.path.tipsJsPath).then(() => {
        console.log('waifu-tips.js 已加载');
        return new Promise(resolve => setTimeout(resolve, 500));
      })
    ]).then(() => {
      console.log('所有资源就绪...');
      
      return fetch(config.path.modelPath + 'model_list.json')
        .then(r => r.json())
        .then(modelData => {
          console.log('模型数据已加载:', modelData);
          
          // 确保模型数据是数组且有内容
          if (!modelData || modelData.length === 0) {
            console.error('模型列表为空！');
            return;
          }
          
          // 初始化 localStorage 中的模型状态
          if (!localStorage.getItem('modelId')) {
            localStorage.setItem('modelId', '0');
            localStorage.setItem('modelTexturesId', '0');
          }
          
          // 调用 initWidget
          if (typeof window.initWidget === 'function') {
            console.log('调用 initWidget');
            window.initWidget({
              waifuPath: config.path.tipsJsonPath,
              cdnPath: config.path.modelPath,
              tools: config.tools,
              dragEnable: config.drag.enable,
              dragDirection: config.drag.direction,
              switchType: config.switchType,
              modelList: { models: modelData }
            });
          }
          
          // 加载当前选中的模型
          setTimeout(() => {
            if (window.live2d) {
              const currentModelId = parseInt(localStorage.getItem('modelId') || '0');
              const currentModel = modelData[currentModelId];
              
              if (currentModel) {
                // 构建模型路径：modelPath + modelPath字段 + model文件名
                // 注意：currentModel.path 已经是 "model/模型名/" 格式
                const modelFullPath = config.path.modelPath + currentModel.path + currentModel.model;
                console.log('加载模型:', currentModel.name, '路径:', modelFullPath);
                window.live2d.loadModel(modelFullPath);
              } else {
                console.error('找不到模型 ID:', currentModelId);
                // 默认加载第一个模型
                const defaultModelPath = config.path.modelPath + modelData[0].path + modelData[0].model;
                window.live2d.loadModel(defaultModelPath);
              }
            }
          }, 1500);
          
          console.log('🎉 初始化完成');
        });
    }).catch(e => console.error('初始化失败:', e));

    function loadCSS(url) {
      return new Promise((resolve, reject) => {
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = url;
        link.onload = () => {
          console.log('CSS加载成功:', url);
          resolve(url);
        };
        link.onerror = (e) => {
          console.error('CSS加载失败:', url, e);
          reject(url);
        };
        document.head.appendChild(link);
      });
    }

    function loadScript(url) {
      return new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = url;
        script.onload = () => {
          console.log('JS加载成功:', url);
          resolve(url);
        };
        script.onerror = (e) => {
          console.error('JS加载失败:', url, e);
          reject(url);
        };
        document.head.appendChild(script);
      });
    }
  })();
</script>

<style>
  #waifu {
    right: 0;
    bottom: 0;
    left: auto;
    z-index: 9999;
  }
  #waifu-toggle {
    right: 5px;
    left: auto;
    z-index: 9999;
  }
  /* 确保看板娘不被其他元素遮挡 */
  #waifu canvas {
    pointer-events: auto;
  }
</style>
