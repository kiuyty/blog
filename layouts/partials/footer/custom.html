{{- /* 添加Live2D看板娘 - 底层API直载版 */ -}}
<script>
  (function() {
    const cdnPath = "https://cdn.jsdelivr.net/gh/kiuyty/live2d@main";
    
    const config = {
      path: {
        homePath: "/",
        modelPath: cdnPath + "/Resources/",
        cssPath: cdnPath + "/css/waifu.css",
        tipsJsonPath: cdnPath + "/Resources/waifu-tips.json",
        tipsJsPath: cdnPath + "/js/waifu-tips.js",
        live2dCorePath: cdnPath + "/Core/live2dcubismcore.js",
        live2dSdkPath: cdnPath + "/js/live2d-sdk.js"
      },
      tools: ["hitokoto", "asteroids", "express", "photo", "info", "quit"], // 先禁用切换按钮
      drag: { enable: true, direction: ["x", "y"] },
      switchType: "order"
    };

    console.log('Live2D 底层API直载版启动', cdnPath);

    if (screen.width < 768) {
      console.log('移动端不显示');
      return;
    }

    Promise.all([
      loadCSS(config.path.cssPath),
      loadScript(config.path.live2dCorePath),
      loadScript(config.path.live2dSdkPath),
      loadScript(config.path.tipsJsPath).then(() => {
        console.log('waifu-tips.js 已加载');
        return new Promise(resolve => setTimeout(resolve, 800));
      })
    ]).then(() => {
      console.log('所有资源就绪，准备使用底层API加载模型...');
      
      // 等待 live2d 对象完全初始化
      setTimeout(() => {
        if (window.live2d && window.live2d.core) {
          console.log('live2d core 已就绪');
          
          // 构建模型文件的完整URL
          const modelUrl = config.path.modelPath + 'model/lafei/lafei.model3.json';
          console.log('尝试加载模型:', modelUrl);
          
          // 使用底层API加载
          // 注意：这里假设 live2d.core 有 loadModel 方法
          if (window.live2d.core && typeof window.live2d.core.loadModel === 'function') {
            window.live2d.core.loadModel(modelUrl).then(model => {
              console.log('模型加载成功:', model);
              
              // 将模型绑定到 canvas
              const canvas = document.getElementById('live2d');
              if (canvas && model) {
                model.mount(canvas);
                model.startMotion();
                console.log('模型已挂载到画布');
              }
            }).catch(err => {
              console.error('底层API加载失败:', err);
            });
          } else {
            // 如果底层API不可用，回退到标准方法但使用目录路径
            console.log('底层API不可用，使用目录路径回退方案');
            const modelDir = config.path.modelPath + 'model/lafei/';
            window.live2d.loadModel(modelDir);
          }
        } else {
          console.error('live2d core 未就绪');
        }
      }, 2000);
      
      console.log('🎉 初始化流程完成');
    }).catch(e => console.error('初始化失败:', e));

    function loadCSS(url) {
      return new Promise((resolve, reject) => {
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = url;
        link.onload = () => {
          console.log('CSS加载成功:', url);
          resolve(url);
        };
        link.onerror = (e) => {
          console.error('CSS加载失败:', url, e);
          reject(url);
        };
        document.head.appendChild(link);
      });
    }

    function loadScript(url) {
      return new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = url;
        script.onload = () => {
          console.log('JS加载成功:', url);
          resolve(url);
        };
        script.onerror = (e) => {
          console.error('JS加载失败:', url, e);
          reject(url);
        };
        document.head.appendChild(script);
      });
    }
  })();
</script>

<style>
  #waifu {
    right: 0;
    bottom: 0;
    left: auto;
    z-index: 9999;
  }
  #waifu-toggle {
    right: 5px;
    left: auto;
    z-index: 9999;
  }
  #waifu canvas {
    pointer-events: auto;
  }
</style>
