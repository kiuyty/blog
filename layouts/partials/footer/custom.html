{{- /* 添加Live2D看板娘 - 最终时机修正版 */ -}}
<script>
  (function() {
    const cdnPath = "https://cdn.jsdelivr.net/gh/kiuyty/live2d@main";
    
    // 定义基础目录和文件名
    const modelBaseDir = cdnPath + "/Resources/model/lafei/";
    const modelFileName = "lafei.model3.json";
    
    const config = {
      path: {
        homePath: "/",
        modelPath: modelBaseDir,
        cssPath: cdnPath + "/css/waifu.css",
        tipsJsonPath: cdnPath + "/Resources/waifu-tips.json",
        tipsJsPath: cdnPath + "/js/waifu-tips.js",
        live2dCorePath: cdnPath + "/Core/live2dcubismcore.js",
        live2dSdkPath: cdnPath + "/js/live2d-sdk.js"
      },
      tools: ["hitokoto", "asteroids", "express", "photo", "info", "quit"],
      drag: { enable: true, direction: ["x", "y"] },
      switchType: "order"
    };

    console.log('Live2D 最终时机修正版启动', cdnPath);

    if (screen.width < 768) {
      console.log('移动端不显示');
      return;
    }

    Promise.all([
      loadCSS(config.path.cssPath),
      loadScript(config.path.live2dCorePath),
      loadScript(config.path.live2dSdkPath),
      loadScript(config.path.tipsJsPath)
    ]).then(() => {
      console.log('所有核心脚本加载完成');
      
      // 关键修复：等待 canvas 元素被创建
      function waitForCanvas() {
        const canvas = document.getElementById('live2d');
        if (canvas) {
          console.log('✅ canvas 元素已找到，准备初始化 SDK');
          // 再给一点点时间让 canvas 完全准备好
          setTimeout(() => {
            if (window.live2d) {
              console.log('调用 init，基础目录:', modelBaseDir);
              window.live2d.init(modelBaseDir);
              
              setTimeout(() => {
                console.log('调用 loadModel，文件名:', modelFileName);
                window.live2d.loadModel(modelFileName);
              }, 500);
            }
          }, 300);
        } else {
          console.log('等待 canvas 元素创建...');
          setTimeout(waitForCanvas, 300);
        }
      }
      
      // 开始等待 canvas
      waitForCanvas();
      
    }).catch(e => console.error('初始化失败:', e));

    function loadCSS(url) {
      return new Promise((resolve, reject) => {
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = url;
        link.onload = () => {
          console.log('CSS加载成功:', url);
          resolve(url);
        };
        link.onerror = (e) => {
          console.error('CSS加载失败:', url, e);
          reject(url);
        };
        document.head.appendChild(link);
      });
    }

    function loadScript(url) {
      return new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = url;
        script.onload = () => {
          console.log('JS加载成功:', url);
          resolve(url);
        };
        script.onerror = (e) => {
          console.error('JS加载失败:', url, e);
          reject(url);
        };
        document.head.appendChild(script);
      });
    }
  })();
</script>

<style>
  #waifu {
    right: 0;
    bottom: 0;
    left: auto;
    z-index: 9999;
  }
  #waifu-toggle {
    right: 5px;
    left: auto;
    z-index: 9999;
  }
  #waifu canvas {
    pointer-events: auto;
  }
</style>
