{{- /* 添加Live2D看板娘 - 标准流程修复版 */ -}}
<script>
  (function() {
    const cdnPath = "https://cdn.jsdelivr.net/gh/kiuyty/live2d@main";
    
    // 定义基础目录：模型文件所在的目录（注意末尾的斜杠）
    const modelBaseDir = cdnPath + "/Resources/model/lafei/";
    // 定义模型文件名
    const modelFileName = "lafei.model3.json";
    
    const config = {
      path: {
        homePath: "/",
        // 注意：这里传递给 SDK 的应该是基础目录
        modelPath: modelBaseDir,
        cssPath: cdnPath + "/css/waifu.css",
        tipsJsonPath: cdnPath + "/Resources/waifu-tips.json",
        tipsJsPath: cdnPath + "/js/waifu-tips.js",
        live2dCorePath: cdnPath + "/Core/live2dcubismcore.js",
        live2dSdkPath: cdnPath + "/js/live2d-sdk.js"
      },
      // 暂时只保留基本功能
      tools: ["hitokoto", "asteroids", "express", "photo", "info", "quit"],
      drag: { enable: true, direction: ["x", "y"] },
      switchType: "order"
    };

    console.log('Live2D 标准流程修复版启动', cdnPath);
    console.log('模型基础目录:', modelBaseDir);
    console.log('模型文件名:', modelFileName);

    if (screen.width < 768) {
      console.log('移动端不显示');
      return;
    }

    Promise.all([
      loadCSS(config.path.cssPath),
      loadScript(config.path.live2dCorePath),
      loadScript(config.path.live2dSdkPath),
      loadScript(config.path.tipsJsPath)
    ]).then(() => {
      console.log('所有核心脚本加载完成');
      
      // 等待 SDK 完全初始化
      setTimeout(() => {
        if (window.live2d) {
          console.log('live2d 对象已找到，准备初始化...');
          
          // 第一步：初始化 SDK，设置模型文件的搜索路径为模型所在目录
          // 注意：init 函数的参数应该是模型文件所在的目录
          window.live2d.init(modelBaseDir);
          console.log('init 调用完成，基础目录:', modelBaseDir);
          
          // 第二步：加载模型，这里只需要传入文件名
          // SDK 会自动在 init 设置的目录下寻找这个文件
          setTimeout(() => {
            console.log('调用 loadModel，文件名:', modelFileName);
            window.live2d.loadModel(modelFileName);
          }, 500);
          
        } else {
          console.error('错误: live2d 对象未找到！');
        }
      }, 1500);
      
    }).catch(e => console.error('初始化失败:', e));

    function loadCSS(url) {
      return new Promise((resolve, reject) => {
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = url;
        link.onload = () => {
          console.log('CSS加载成功:', url);
          resolve(url);
        };
        link.onerror = (e) => {
          console.error('CSS加载失败:', url, e);
          reject(url);
        };
        document.head.appendChild(link);
      });
    }

    function loadScript(url) {
      return new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = url;
        script.onload = () => {
          console.log('JS加载成功:', url);
          resolve(url);
        };
        script.onerror = (e) => {
          console.error('JS加载失败:', url, e);
          reject(url);
        };
        document.head.appendChild(script);
      });
    }
  })();
</script>

<style>
  #waifu {
    right: 0;
    bottom: 0;
    left: auto;
    z-index: 9999;
  }
  #waifu-toggle {
    right: 5px;
    left: auto;
    z-index: 9999;
  }
  #waifu canvas {
    pointer-events: auto;
  }
</style>
