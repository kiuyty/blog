<script>
(function() {

const cdnPath = "https://cdn.jsdelivr.net/gh/kiuyty/live2d@main";

const config = {
  path: {
    homePath: "/",
    modelPath: cdnPath + "/Resources/",
    cssPath: cdnPath + "/css/waifu.css",
    tipsJsonPath: cdnPath + "/Resources/waifu-tips.json",
    tipsJsPath: cdnPath + "/js/waifu-tips.js",
    live2dCorePath: cdnPath + "/Core/live2dcubismcore.js",
    live2dSdkPath: cdnPath + "/js/live2d-sdk.js"
  },
  tools: [
    "hitokoto",
    "asteroids",
    "express",
    "switch-model",
    "switch-texture",
    "photo",
    "info",
    "quit"
  ],
  drag: { enable: true, direction: ["x","y"] },
  switchType: "order"
};

console.log("Live2D SDK启动", cdnPath);

if (screen.width < 768) {
  console.log("移动端不显示");
  return;
}

Promise.all([
  loadCSS(config.path.cssPath),
  loadScript(config.path.live2dCorePath),
  loadScript(config.path.live2dSdkPath),
  loadScript(config.path.tipsJsPath)
]).then(() => {

  console.log("资源加载完成");

  return fetch(config.path.modelPath + "model_list.json")
    .then(r => r.json())
    .then(modelData => {

      console.log("模型列表:", modelData);

      if (window.initWidget) {
        window.initWidget({
          waifuPath: config.path.tipsJsonPath,
          cdnPath: config.path.modelPath,
          tools: config.tools,
          dragEnable: config.drag.enable,
          dragDirection: config.drag.direction,
          switchType: config.switchType,
          modelList: modelData
        });
      }

      console.log("Live2D 初始化完成");

    });

}).catch(e => console.error("Live2D 初始化失败:", e));

function loadCSS(url){
  return new Promise((resolve,reject)=>{
    const link=document.createElement("link");
    link.rel="stylesheet";
    link.href=url;
    link.onload=resolve;
    link.onerror=reject;
    document.head.appendChild(link);
  });
}

function loadScript(url){
  return new Promise((resolve,reject)=>{
    const s=document.createElement("script");
    s.src=url;
    s.onload=resolve;
    s.onerror=reject;
    document.head.appendChild(s);
  });
}

})();
</script>
