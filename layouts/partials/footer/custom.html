{{- /* 添加Live2D看板娘 - 终极内部状态修复版 */ -}}
<script>
  (function() {
    const cdnPath = "https://cdn.jsdelivr.net/gh/kiuyty/live2d@main";
    
    const config = {
      path: {
        homePath: "/",
        modelPath: cdnPath + "/Resources/",
        cssPath: cdnPath + "/css/waifu.css",
        tipsJsonPath: cdnPath + "/Resources/waifu-tips.json",
        tipsJsPath: cdnPath + "/js/waifu-tips.js",
        live2dCorePath: cdnPath + "/Core/live2dcubismcore.js",
        live2dSdkPath: cdnPath + "/js/live2d-sdk.js"
      },
      tools: ["hitokoto", "asteroids", "express", "switch-model", "switch-texture", "photo", "info", "quit"],
      drag: { enable: true, direction: ["x", "y"] },
      switchType: "order"
    };

    console.log('Live2D 终极修复版启动', cdnPath);

    if (screen.width < 768) {
      console.log('移动端不显示');
      return;
    }

    Promise.all([
      loadCSS(config.path.cssPath),
      loadScript(config.path.live2dCorePath),
      loadScript(config.path.live2dSdkPath),
      loadScript(config.path.tipsJsPath).then(() => {
        console.log('waifu-tips.js 已加载');
        return new Promise(resolve => setTimeout(resolve, 800)); // 给更多时间初始化
      })
    ]).then(() => {
      console.log('所有资源就绪，开始深度修复...');
      
      return fetch(config.path.modelPath + 'model_list.json')
        .then(r => r.json())
        .then(modelData => {
          console.log('模型数据已加载:', modelData);
          
          // ========== 深度修复内部状态 ==========
          
          // 1. 修复 localStorage 状态
          localStorage.setItem('modelId', '0');
          localStorage.setItem('modelTexturesId', '0');
          
          // 2. 尝试找到并修复 waifu-tips.js 内部的全局变量
          // 常见的内部变量名
          const possibleVarNames = ['modelList', 'ModelList', 'models', 'g_modelList', '_modelList'];
          possibleVarNames.forEach(name => {
            if (window[name] !== undefined) {
              console.log('找到内部变量:', name, '正在修复...');
              window[name] = { models: modelData };
            }
          });
          
          // 3. 如果存在 ModelLoader 实例，直接修复它
          if (window.modelLoader) {
            console.log('找到 modelLoader 实例');
            window.modelLoader.modelList = { models: modelData };
          }
          
          // 4. 遍历所有全局对象，尝试找到包含模型的变量
          for (let key in window) {
            try {
              if (window[key] && typeof window[key] === 'object') {
                // 如果对象有 models 属性且是数组，但为空
                if (window[key].models && Array.isArray(window[key].models) && window[key].models.length === 0) {
                  console.log('修复对象:', key);
                  window[key].models = modelData;
                }
                // 如果对象本身就是数组且为空
                if (Array.isArray(window[key]) && window[key].length === 0) {
                  console.log('修复数组:', key);
                  window[key] = modelData;
                }
              }
            } catch (e) {}
          }
          
          // 5. 调用 initWidget（作为辅助）
          if (typeof window.initWidget === 'function') {
            console.log('调用 initWidget');
            window.initWidget({
              waifuPath: config.path.tipsJsonPath,
              cdnPath: config.path.modelPath,
              tools: config.tools,
              dragEnable: config.drag.enable,
              dragDirection: config.drag.direction,
              switchType: config.switchType,
              modelList: { models: modelData }
            });
          }
          
          // 6. 加载第一个模型 - 使用正确的绝对路径
          setTimeout(() => {
            if (window.live2d) {
              // 构建正确的模型路径：直接指向 model3.json 文件
              const modelFullPath = config.path.modelPath + 'model/lafei/lafei.model3.json';
              console.log('使用绝对路径加载模型:', modelFullPath);
              
              // 重要：先初始化，但注意不要重复拼接路径
              window.live2d.init(config.path.modelPath + 'model/');
              
              // 直接加载文件，而不是目录
              window.live2d.loadModel(modelFullPath);
            }
          }, 1000);
          
          console.log('🎉 深度修复完成');
        });
    }).catch(e => console.error('初始化失败:', e));

    function loadCSS(url) {
      return new Promise((resolve, reject) => {
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = url;
        link.onload = () => {
          console.log('CSS加载成功:', url);
          resolve(url);
        };
        link.onerror = (e) => {
          console.error('CSS加载失败:', url, e);
          reject(url);
        };
        document.head.appendChild(link);
      });
    }

    function loadScript(url) {
      return new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = url;
        script.onload = () => {
          console.log('JS加载成功:', url);
          resolve(url);
        };
        script.onerror = (e) => {
          console.error('JS加载失败:', url, e);
          reject(url);
        };
        document.head.appendChild(script);
      });
    }
  })();
</script>

<style>
  #waifu {
    right: 0;
    bottom: 0;
    left: auto;
    z-index: 9999;
  }
  #waifu-toggle {
    right: 5px;
    left: auto;
    z-index: 9999;
  }
  #waifu canvas {
    pointer-events: auto;
  }
</style>
