<script>
  const cdnPath = "https://cdn.jsdelivr.net/gh/kiuyty/live2d@main";
  const config = {
    // 资源路径
    path: {
      homePath: "/",
      modelPath: cdnPath + "/Resources/",
      cssPath: cdnPath + "/waifu.css",
      tipsJsonPath: cdnPath + "/waifu-tips.json",
      tipsJsPath: cdnPath + "/waifu-tips.js",
      live2dCorePath: cdnPath + "/Core/live2dcubismcore.js",
      live2dSdkPath: cdnPath + "/live2d-sdk.js"
    },
    // 工具栏
    tools: ["hitokoto", "asteroids", "express", "switch-model", "switch-texture", "photo", "info", "quit"],
    // 模型拖拽
    drag: {
      enable: true,
      direction: ["x", "y"]
    },
    // 模型切换(order: 顺序切换，random: 随机切换)
    switchType: "order"
  }

  // 加载资源并初始化
  if (screen.width >= 768) {
    Promise.all([
      loadExternalResource(config.path.cssPath, "css"),
      loadExternalResource(config.path.live2dCorePath, "js"),
      loadExternalResource(config.path.live2dSdkPath, "js"),
      loadExternalResource(config.path.tipsJsPath, "js")
    ]).then(() => {
      initWidget({
        waifuPath: config.path.tipsJsonPath,
        cdnPath: config.path.modelPath,
        tools: config.tools,
        dragEnable: config.drag.enable,
        dragDirection: config.drag.direction,
        switchType: config.switchType
      });
    });
  }

  // 异步加载资源
  function loadExternalResource(url, type) {
    return new Promise((resolve, reject) => {
      let tag;
      if (type === "css") {
        tag = document.createElement("link");
        tag.rel = "stylesheet";
        tag.href = url;
      }
      else if (type === "js") {
        tag = document.createElement("script");
        tag.src = url;
      }
      if (tag) {
        tag.onload = () => resolve(url);
        tag.onerror = () => reject(url);
        document.head.appendChild(tag);
      }
    });
  }
</script>

<style>
    #TableOfContents > ul, ol {
        ul, ol {
            display: none;
        }
        .open {
            display: block;
        }
    }
</style>

<script>
    function initTocHide() {
        // 判断是否存在文章目录
        let toc = document.querySelector(".widget--toc");
        if (!toc) {
            return;
        }
        // 监听滚动
        window.addEventListener('scroll', function() {
            //清除class值
            let openUl = document.querySelectorAll(".open");
            if (openUl.length > 0) {
              openUl.forEach((ul) => {
                ul.classList.remove("open")
              })
            }
            // 获取active-class
            let currentLi = document.querySelector(".active-class");
            if (!currentLi) {
                return
            }
            // 展示子ul
            if (currentLi.children.length > 1) {
                currentLi.children[1].classList.add("open")
            }
            // 展示父ul
            let ul = currentLi.parentElement;
            do {
                ul.classList.add("open");
                ul = ul.parentElement.parentElement
            } while (ul !== undefined && (ul.localName === 'ul' || ul.localName === 'ol'))
        });
    }
    initTocHide()
</script>

<!-- 背景图片与动态遮罩 - 适配 Stack 主题 -->
<style>
  body {
    position: relative;
    background: url({{ (resources.Get "background/bg.avif").Permalink }}) no-repeat center top;
    background-size: cover;
    background-attachment: fixed;
  }

  /* 默认明亮模式：不加遮罩 */
  body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.55); /* 暗色模式遮罩颜色 */
    pointer-events: none;
    z-index: -1;
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  /* 当 body 有 'dark-bg' 类时显示遮罩 */
  body.dark-bg::before {
    opacity: 1;
  }
</style>

<script>
  (function() {
    // 更新背景遮罩状态的函数
    function updateBackgroundOverlay() {
      let isDarkMode = false;
      
      // 1. 首先尝试从 localStorage 读取 Stack 主题设置
      try {
        const storedTheme = localStorage.getItem('stack-theme') || localStorage.getItem('theme');
        if (storedTheme === 'dark') isDarkMode = true;
        if (storedTheme === 'light') isDarkMode = false;
      } catch(e) { /* 忽略 */ }
      
      // 2. 如果 localStorage 没有，尝试检测系统设置
      if (localStorage.getItem('stack-theme') === null && localStorage.getItem('theme') === null) {
        isDarkMode = window.matchMedia('(prefers-color-scheme: dark)').matches;
      }
      
      // 3. 根据结果添加或移除 body 上的类
      if (isDarkMode) {
        document.body.classList.add('dark-bg');
        console.log('深色模式已启用，背景变暗');
      } else {
        document.body.classList.remove('dark-bg');
        console.log('明亮模式，背景正常');
      }
    }
    
    // 初始化
    updateBackgroundOverlay();
    
    // 监听 localStorage 变化（当其他标签页修改主题时）
    window.addEventListener('storage', function(e) {
      if (e.key === 'stack-theme' || e.key === 'theme') {
        updateBackgroundOverlay();
      }
    });
    
    // 主动查找并监听 Stack 主题的切换按钮
    function setupThemeToggleListener() {
      // Stack 主题的切换按钮常见的选择器
      const themeToggle = document.querySelector('.theme-toggle, [data-theme-toggle], .dark-mode-toggle');
      if (themeToggle) {
        themeToggle.addEventListener('click', function() {
          // 等待 DOM 和 localStorage 更新
          setTimeout(updateBackgroundOverlay, 50);
        });
        console.log('已找到主题切换按钮，已添加监听');
      } else {
        // 如果没找到，稍后再试
        setTimeout(setupThemeToggleListener, 500);
      }
    }
    
    setupThemeToggleListener();
    
    // 监听系统主题变化（如果用户从未手动切换过主题）
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', updateBackgroundOverlay);
  })();
</script>
